{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("{% static 'bg.jpg' %}") no-repeat center center;
    background-size: cover;
}

/* BOX */
.view-box {
    max-width: 500px;
    width: 90%;              
    margin: 40px auto;
    padding: 20px;
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.view-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* FIELD */
.field {
    margin-bottom: 15px;
}

.label {
    font-weight: bold;
}

.value {
    margin-top: 5px;
    padding: 8px;
    background: #f2f2f2;
    border-radius: 6px;
}

/* BUTTON */
.btn {
    display: block;
    text-align: center;
    margin-top: 20px;
    padding: 10px;
    background: #007bff;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

.btn:hover {
    background: #0056b3;
}

/* 📱 MOBILE */
@media (max-width: 480px) {

    .view-box {
        padding: 15px;
        margin: 20px auto;
    }

    .view-box h2 {
        font-size: 18px;
    }

    .value {
        font-size: 14px;
    }

    .btn {
        font-size: 14px;
        padding: 10px;
    }
}
</style>

<div class="view-box">
    <h2>Prescription Details</h2>

    <div class="field">
        <div class="label">Patient Name</div>
        <div class="value">{{ p.patient.name }}</div>
    </div>

    <div class="field">
        <div class="label">Doctor</div>
        <div class="value">{{ p.doctor.name }}</div>
    </div>

    <div class="field">
        <div class="label">Medicines</div>
        <div class="value">{{ p.medicines }}</div>
    </div>

    <div class="field">
        <div class="label">Notes</div>
        <div class="value">{{ p.notes }}</div>
    </div>

    <a href="/history/" class="btn">⬅ Back to Appointments</a>
</div>

{% endblock %}
