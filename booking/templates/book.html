{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="book-page">
    <div class="book-box">

    <h2>Book Appointment 🩺</h2>

    {% if messages %}
        {% for message in messages %}
            <p class="error-msg">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <div class="doctor-info">
        {% if doctor.image %}
            <img src="{{ doctor.image.url }}">
        {% else %}
            <img src="https://via.placeholder.com/120">
        {% endif %}

        <h3>{{ doctor.name }}</h3>
        <p>{{ doctor.specialization }}</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <label>Select Date:</label>
        <input type="date" name="date" required>

        <label>Select Time Slot:</label>
        <select name="time" required>
            <option value="">--Select Time--</option>
            <option value="09:00">09:00 AM</option>
            <option value="10:00">10:00 AM</option>
            <option value="11:00">11:00 AM</option>
            <option value="12:00">12:00 PM</option>
            <option value="14:00">02:00 PM</option>
            <option value="15:00">03:00 PM</option>
        </select>

        <button type="submit">Confirm Booking</button>
    </form>

  </div>
</div>

<style>
.book-page {
    min-height: 100vh;
    background: url("{% static 'bg.jpg' %}") no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ✅ Card */
.book-box {
    max-width: 400px;
    width: 90%;            
    padding: 20px;
    background: rgba(255,255,255,0.9);
    border-radius: 10px;
    text-align: center;
}

/* ✅ Doctor Image */
.doctor-info img {
    width: 100px;          
    height: 100px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* ✅ Inputs */
select, input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* ✅ Button */
button {
    width: 100%;
    padding: 10px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
}

/* ✅ Error */
.error-msg {
    color: red;
    font-size: 14px;
}

/* 📱 MOBILE FIX */
@media (max-width: 480px) {
    .book-box {
        padding: 15px;
    }

    .doctor-info img {
        width: 80px;
        height: 80px;
    }

    h2 {
        font-size: 18px;
    }
}
</style>

{% endblock %}
